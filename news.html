<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Přehled článků</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root {
      --main: rgb(245,184,164);
      --main-dark: rgb(220,160,140);
      --bg: #f6f7f8;
      --text: #1f1f1f;
      --muted: #6b7280;
      --card: #ffffff;
      --border: #e7e7e7;
      --shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--main);
      padding: 20px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .crossref-btn {
      text-decoration: none;
      background: #fff;
      color: #222;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: var(--shadow);
    }

    .crossref-btn:hover {
      background: var(--main-dark);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      color: #222;
    }

    .subhead {
      margin-top: 6px;
      font-size: 13px;
      color: #4b5563;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .filters {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 18px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .filter-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .filter-group select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
    }

    .toolbar {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .result-count {
      font-size: 14px;
      color: var(--muted);
    }

    .reset-btn {
      border: none;
      background: var(--main);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .news-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .card-inner {
      padding: 18px;
    }

    .meta-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .meta-pill {
      padding: 5px 10px;
      border-radius: 999px;
      background: #f3f4f6;
    }

    .abstract-link {
      text-decoration: none;
      color: var(--text);
    }

    @media (max-width: 768px) {
      .header-flex {
        flex-direction: column;
        align-items: flex-start;
      }

      .crossref-btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner header-flex">
      <div>
        <h1 id="page-title">Přehled článků</h1>
        <div class="subhead">Automaticky generovaný přehled ze souboru source.csv</div>
      </div>

      <a href="news-crossref.html" class="crossref-btn">Crossref</a>
    </div>
  </header>

  <main class="page">
    <section class="filters">
      <div class="filters-grid">
        <div class="filter-group">
          <label>Téma</label>
          <select id="keywordFilter"><option value="">Všechna témata</option></select>
        </div>

        <div class="filter-group">
          <label>Zdroj</label>
          <select id="sourceFilter"><option value="">Všechny zdroje</option></select>
        </div>
      </div>

      <div class="toolbar">
        <div id="resultCount">Načítám…</div>
        <button id="resetFilters" class="reset-btn">Zrušit filtry</button>
      </div>
    </section>

    <section id="newsList" class="news-list"></section>
  </main>

  <script>
    let allRows = [];

    function sanitize(v){ return (v||"").toString().trim(); }

    function formatDateTimeCZ(d){
      return d.toLocaleString("cs-CZ", {
        day:"2-digit", month:"2-digit", year:"numeric",
        hour:"2-digit", minute:"2-digit"
      });
    }

    function setTitleFromHeaderDate() {
      fetch("source.csv", { method: "HEAD" })
        .then(res => {
          const lm = res.headers.get("Last-Modified");
          if (lm) {
            const d = new Date(lm);
            document.getElementById("page-title").textContent =
              `Přehled článků (${formatDateTimeCZ(d)})`;
          }
        });
    }

    function populateFilters(rows){
      const kf=document.getElementById("keywordFilter");
      const sf=document.getElementById("sourceFilter");

      [...new Set(rows.map(r=>r.keyword))].forEach(v=>{
        const o=document.createElement("option"); o.value=v; o.textContent=v; kf.appendChild(o);
      });

      [...new Set(rows.map(r=>r.source))].forEach(v=>{
        const o=document.createElement("option"); o.value=v; o.textContent=v; sf.appendChild(o);
      });
    }

    function renderRows(){
      const kv=document.getElementById("keywordFilter").value;
      const sv=document.getElementById("sourceFilter").value;
      const list=document.getElementById("newsList");

      const data=allRows.filter(r=>(!kv||r.keyword===kv)&&(!sv||r.source===sv));

      list.innerHTML="";
      data.forEach(r=>{
        const el=document.createElement("div");
        el.className="card";
        el.innerHTML=`<div class="card-inner">
          <div class="meta-row">
            <span class="meta-pill">${r.date}</span>
            <span class="meta-pill">${r.keyword}</span>
            <span class="meta-pill">${r.source}</span>
          </div>
          <a class="abstract-link" href="${r.link}" target="_blank">${r.abstract}</a>
        </div>`;
        list.appendChild(el);
      });

      document.getElementById("resultCount").textContent=`Počet článků: ${data.length}`;
    }

    document.getElementById("resetFilters").onclick=()=>{
      document.getElementById("keywordFilter").value="";
      document.getElementById("sourceFilter").value="";
      renderRows();
    };

    Papa.parse("source.csv",{
      download:true,
      header:true,
      complete:r=>{
        allRows=r.data.map(x=>({
          date:sanitize(x.date),
          keyword:sanitize(x.keyword),
          source:sanitize(x.source),
          link:sanitize(x.link),
          abstract:sanitize(x.abstract)
        })).filter(x=>x.date&&x.link);

        populateFilters(allRows);
        renderRows();
        setTitleFromHeaderDate();  // ← klíčová oprava
      }
    });
  </script>

</body>
</html>
