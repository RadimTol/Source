<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Přehled článků</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root {
      --main: rgb(245,184,164);
      --main-dark: rgb(220,160,140);
      --bg: #f6f7f8;
      --text: #1f1f1f;
      --muted: #6b7280;
      --card: #ffffff;
      --border: #e7e7e7;
      --shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--main);
      padding: 20px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* NOVÉ */
    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .crossref-btn {
      text-decoration: none;
      background: #fff;
      color: #222;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: var(--shadow);
      white-space: nowrap;
    }

    .crossref-btn:hover {
      background: var(--main-dark);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 800;
      color: #222;
    }

    .subhead {
      margin-top: 6px;
      font-size: 13px;
      color: #4b5563;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .filters {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 18px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .filter-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #374151;
    }

    .filter-group select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
      font-size: 14px;
      color: #111827;
      outline: none;
    }

    .filter-group select:focus {
      border-color: var(--main-dark);
      box-shadow: 0 0 0 3px rgba(245,184,164,0.25);
    }

    .toolbar {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .result-count {
      font-size: 14px;
      color: var(--muted);
    }

    .reset-btn {
      border: none;
      background: var(--main);
      color: #222;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    .reset-btn:hover {
      background: var(--main-dark);
    }

    .news-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    }

    .card-inner {
      padding: 18px 18px 16px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      border: 1px solid #ececec;
      white-space: nowrap;
    }

    .meta-pill.topic {
      background: rgba(245,184,164,0.22);
      border-color: rgba(245,184,164,0.45);
      color: #7a3f2f;
      font-weight: 700;
    }

    .meta-pill.source {
      font-weight: 700;
    }

    .abstract-link {
      display: block;
      color: var(--text);
      text-decoration: none;
      line-height: 1.6;
      font-size: 16px;
    }

    .abstract-link:hover {
      text-decoration: underline;
      text-decoration-color: var(--main-dark);
    }

    .empty {
      background: #fff;
      border: 1px dashed #d1d5db;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    .footer-note {
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 768px) {
      .header-flex {
        flex-direction: column;
        align-items: flex-start;
      }

      .crossref-btn {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner header-flex">
      <div>
        <h1 id="page-title">Přehled článků</h1>
        <div class="subhead">Automaticky generovaný přehled ze souboru source.csv</div>
      </div>

      <a href="news-crossref.html" class="crossref-btn">Crossref</a>
    </div>
  </header>

  <!-- ZBYTEK TVÉHO PŮVODNÍHO HTML + JS ZŮSTÁVÁ BEZE ZMĚNY -->

</body>
</html>
