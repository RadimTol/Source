<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Přehled článků</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
}

header {
  background: rgb(245,184,164);
  padding: 20px;
  color: #222;
  font-size: 24px;
  font-weight: bold;
}

.container {
  max-width: 900px;
  margin: 20px auto;
  padding: 10px;
}

.card {
  background: white;
  padding: 16px;
  margin-bottom: 16px;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.meta {
  font-size: 12px;
  color: #777;
  margin-bottom: 6px;
}

.keyword {
  font-weight: bold;
  color: rgb(245,184,164);
}

.source {
  margin-left: 10px;
}

.abstract {
  margin-top: 8px;
  line-height: 1.5;
  color: #222;
  text-decoration: none;
}

.abstract:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<header id="title">Přehled článků</header>

<div class="container" id="news"></div>

<script>
function formatDateCZ(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString("cs-CZ", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric"
  });
}

function formatFileDate(d) {
  return d.toLocaleString("cs-CZ", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

// načtení CSV
Papa.parse("source.csv", {
  download: true,
  header: true,
  complete: function(results) {

    const data = results.data.filter(r => r.date);

    // řazení (nejnovější nahoře)
    data.sort((a,b) => new Date(b.date) - new Date(a.date));

    const container = document.getElementById("news");

    data.forEach(row => {
      const card = document.createElement("div");
      card.className = "card";

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML =
        `<span>${formatDateCZ(row.date)}</span> | 
         <span class="keyword">${row.keyword}</span> | 
         <span class="source">${row.source}</span>`;

      const abstract = document.createElement("a");
      abstract.className = "abstract";
      abstract.href = row.link;
      abstract.target = "_blank";
      abstract.innerText = row.abstract;

      card.appendChild(meta);
      card.appendChild(abstract);

      container.appendChild(card);
    });
  }
});

// datum souboru (hack přes HEAD request)
fetch("source.csv", { method: "HEAD" })
  .then(res => {
    const lastModified = res.headers.get("Last-Modified");
    if (lastModified) {
      const d = new Date(lastModified);
      document.getElementById("title").innerText =
        "Přehled článků (" + formatFileDate(d) + ")";
    }
  });
</script>

</body>
</html>
