name: News monitor

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: "Start date in YYYY-MM-DD"
        required: false
      date_to:
        description: "End date in YYYY-MM-DD"
        required: false
  schedule:
    - cron: '0 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Prague time
        id: time
        shell: bash
        run: |
          H=$(TZ=Europe/Prague date +%H)
          echo "hour=$H" >> "$GITHUB_OUTPUT"
          echo "Hour in Prague: $H"

      - name: Stop outside scheduled hours
        if: steps.time.outputs.hour != '03' && steps.time.outputs.hour != '15' && github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          echo "Skipping run outside 03:00 and 15:00 Europe/Prague."
          exit 0

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system libraries
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev

      - name: Install R packages
        shell: bash
        run: |
          Rscript -e 'install.packages(c(
            "dplyr","purrr","stringr","readr",
            "tibble","xml2","tidyr","rvest"
          ), repos = "https://cloud.r-project.org")'

      - name: Run script
        shell: bash
        run: |
          Rscript source.R "${{ github.event.inputs.date_from }}" "${{ github.event.inputs.date_to }}"

      - name: Show generated files
        shell: bash
        run: |
          echo "Files in workspace:"
          ls -la
          echo ""
          echo "Preview of source.csv:"
          if [ -f source.csv ]; then
            head -n 20 source.csv
          else
            echo "source.csv not found"
          fi
          echo ""
          echo "Preview of news_monitor.log:"
          if [ -f news_monitor.log ]; then
            tail -n 50 news_monitor.log
          else
            echo "news_monitor.log not found"
          fi

      - name: Commit and push results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add source.csv news_monitor.log

          git diff --cached --quiet || git commit -m "Auto-update news monitoring output"

          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: news-monitor-output
          path: |
            source.csv
            news_monitor.log
          if-no-files-found: warn
