name: News monitor

on:
  schedule:
    # workflow se spousti kazdou hodinu; samotny job bezi jen v 03:00 a 15:00 Europe/Prague
    - cron: '5 2,14 * * *'
  workflow_dispatch:

jobs:
  run-news-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Prague schedule
        id: schedule_check
        shell: bash
        run: |
          PRAGUE_HOUR=$(TZ=Europe/Prague date +%H)
          echo "Prague hour: ${PRAGUE_HOUR}"
          if [ "${PRAGUE_HOUR}" = "03" ] || [ "${PRAGUE_HOUR}" = "15" ]; then
            echo "run_job=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_job=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop outside 03:00 / 15:00 Europe/Prague
        if: steps.schedule_check.outputs.run_job != 'true'
        run: echo "Skipping run outside target hours."

      - name: Setup R
        if: steps.schedule_check.outputs.run_job == 'true'
        uses: r-lib/actions/setup-r@v2

      - name: Install system libraries
        if: steps.schedule_check.outputs.run_job == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev

      - name: Install R packages
        if: steps.schedule_check.outputs.run_job == 'true'
        run: |
          Rscript -e 'install.packages(c(
            "tidyRSS","dplyr","purrr","stringr","lubridate",
            "readr","tibble","xml2","tidyr","rvest"
          ), repos = "https://cloud.r-project.org")'

      - name: Run monitor (last 12 hours)
        if: steps.schedule_check.outputs.run_job == 'true'
        run: |
          Rscript news_monitor_v2.R \
            --hours-back 12 \
            --keywords-file keywords.txt \
            --output-file source.csv \
            --log-file news_monitor.log

      - name: Upload CSV output
        if: steps.schedule_check.outputs.run_job == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: news-monitor-output
          path: |
            source.csv
            news_monitor.log
