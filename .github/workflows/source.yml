name: News monitor

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # každou hodinu, filtrujeme níže

jobs:
  run-news-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check Prague schedule
        id: schedule_check
        shell: bash
        run: |
          PRAGUE_HOUR=$(TZ=Europe/Prague date +%H)
          echo "Prague hour: ${PRAGUE_HOUR}"
          if [ "${PRAGUE_HOUR}" = "03" ] || [ "${PRAGUE_HOUR}" = "15" ]; then
            echo "run_job=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_job=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop outside schedule
        if: steps.schedule_check.outputs.run_job != 'true'
        run: echo "Skipping run outside target hours."

      - name: Setup R
        if: steps.schedule_check.outputs.run_job == 'true'
        uses: r-lib/actions/setup-r@v2

      - name: Install system libraries
        if: steps.schedule_check.outputs.run_job == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libxml2-dev libssl-dev

      - name: Install R packages
        if: steps.schedule_check.outputs.run_job == 'true'
        run: |
          Rscript -e 'install.packages(c(
            "tidyRSS","dplyr","purrr","stringr","lubridate",
            "readr","tibble","xml2","tidyr","rvest"
          ), repos = "https://cloud.r-project.org")'

      - name: Run monitor
        if: steps.schedule_check.outputs.run_job == 'true'
        run: |
          Rscript news_monitor_v2.R \
            --hours-back 12 \
            --keywords-file keywords.txt \
            --output-file source.csv \
            --log-file news_monitor.log

      - name: Commit and push results
        if: steps.schedule_check.outputs.run_job == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add source.csv news_monitor.log

          # commit jen pokud jsou změny
          git diff --cached --quiet || git commit -m "Auto-update news monitoring output"

          git push
