name: News monitor

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: "YYYY-MM-DD"
        required: false
      date_to:
        description: "YYYY-MM-DD"
        required: false
  schedule:
    - cron: '0 * * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Prague time
        id: time
        run: |
          H=$(TZ=Europe/Prague date +%H)
          echo "hour=$H" >> $GITHUB_OUTPUT

      - name: Skip if not 03/15
        if: steps.time.outputs.hour != '03' && steps.time.outputs.hour != '15' && github.event_name != 'workflow_dispatch'
        run: echo "Skipping"

      - uses: r-lib/actions/setup-r@v2
        if: steps.time.outputs.hour == '03' || steps.time.outputs.hour == '15' || github.event_name == 'workflow_dispatch'

      - name: Install packages
        run: |
          Rscript -e 'install.packages(c("tidyRSS","dplyr","purrr","stringr","readr","tibble","xml2","tidyr","rvest","tidyRSS"), repos="https://cloud.r-project.org")'

      - name: Run script
        run: |
          Rscript source.R "${{ github.event.inputs.date_from }}" "${{ github.event.inputs.date_to }}"

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add source.csv news_monitor.log
          git diff --cached --quiet || git commit -m "update"
          git push
